<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Музыкальное лото — караоке-сервис</title>
<style>
  :root {
    --bg: #0d0b1a; --bg2: #171332;
    --accent: #ff2e63; --accent2: #3b82f6;
    --text-dim: #5c5a78; --text-past: #9a97c2; --text-active: #ffffff;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%;
    background: radial-gradient(ellipse at center, var(--bg2) 0%, var(--bg) 70%);
    font-family: 'Segoe UI', Arial, sans-serif;
    color: var(--text-active);
  }
  .app { display: flex; flex-direction: column; height: 100vh; }

  .setup {
    padding: 24px 32px;
    background: rgba(0,0,0,0.25);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    display: flex; flex-wrap: wrap; gap: 16px; align-items: flex-end;
    flex-shrink: 0;
  }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 12px; color: var(--text-past); text-transform: uppercase; letter-spacing: .05em; }
  input[type="file"], input[type="number"], input[type="text"] {
    background: #1e1a3d; border: 1px solid rgba(255,255,255,.15);
    color: white; padding: 8px 12px; border-radius: 8px; font-size: 14px;
  }
  input[type="number"] { width: 100px; }
  button {
    background: linear-gradient(135deg, var(--accent), #ff5f8f);
    border: none; color: white; padding: 10px 20px;
    border-radius: 8px; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: transform .15s;
  }
  button:hover { transform: translateY(-1px); }
  button:disabled { opacity: .4; cursor: not-allowed; transform: none; }
  button.secondary { background: rgba(255,255,255,.08); }

  .status { font-size: 13px; color: var(--text-past); }
  .status.error { color: var(--accent); }

  .library {
    padding: 12px 32px; background: rgba(0,0,0,.15);
    display: flex; gap: 10px; flex-wrap: wrap; flex-shrink: 0;
    border-bottom: 1px solid rgba(255,255,255,.06);
  }
  .track-chip {
    background: #1e1a3d; border: 1px solid rgba(255,255,255,.1);
    padding: 6px 14px; border-radius: 20px; font-size: 13px;
    cursor: pointer; color: var(--text-past);
  }
  .track-chip:hover { color: white; border-color: var(--accent); }

  .stage {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; position: relative; padding: 0 40px;
  }
  .meta { position: absolute; top: 24px; left: 0; right: 0; text-align: center; color: var(--text-past); font-size: 15px; }
  .meta .title { color: white; font-weight: 700; font-size: 20px; }

  .lyrics {
    max-width: 900px; text-align: center; font-size: 34px; font-weight: 700;
    line-height: 1.7; max-height: 70vh; overflow: hidden;
  }
  .word { color: var(--text-dim); transition: color .15s ease, transform .15s ease; display: inline-block; margin: 0 6px; }
  .word.past { color: var(--text-past); }
  .word.active { color: var(--text-active); text-shadow: 0 0 20px var(--accent), 0 0 40px rgba(255,46,99,.5); transform: scale(1.08); }

  .controls {
    padding: 20px 32px; background: rgba(0,0,0,.25);
    border-top: 1px solid rgba(255,255,255,.08);
    display: flex; align-items: center; gap: 16px; flex-shrink: 0;
  }
  .progress-wrap { flex: 1; display: flex; align-items: center; gap: 10px; }
  .progress-bar { flex: 1; height: 6px; background: rgba(255,255,255,.12); border-radius: 3px; position: relative; cursor: pointer; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 3px; width: 0%; }
  .time { font-size: 13px; color: var(--text-past); min-width: 45px; }
  .hint { color: var(--text-dim); font-size: 15px; text-align: center; padding: 40px; }
  .spinner {
    width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.2);
    border-top-color: var(--accent); border-radius: 50%;
    display: inline-block; animation: spin .8s linear infinite; margin-right: 8px; vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="app">

  <div class="setup">
    <div class="field">
      <label>Загрузить трек</label>
      <input type="file" id="audioFile" accept="audio/*">
    </div>
    <div class="field">
      <label>Название</label>
      <input type="text" id="titleInput" placeholder="Царица">
    </div>
    <div class="field">
      <label>Исполнитель</label>
      <input type="text" id="artistInput" placeholder="ANNA ASTI">
    </div>
    <div class="field">
      <label>Хук-момент (сек)</label>
      <input type="number" id="startOffset" value="0" min="0" step="0.5">
    </div>
    <button id="loadBtn">Распознать и загрузить</button>
    <span class="status" id="status"></span>
  </div>

  <div class="library" id="library" style="display:none"></div>

  <div class="stage">
    <div class="meta" id="meta" style="display:none">
      <div class="title" id="metaTitle"></div>
      <div id="metaArtist"></div>
    </div>
    <div class="lyrics" id="lyrics">
      <div class="hint">Загрузите mp3-трек — текст распознается и синхронизируется автоматически.<br>Треки сохраняются в этом браузере, повторно распознавать не придётся.</div>
    </div>
  </div>

  <div class="controls" id="controls" style="display:none">
    <button id="playBtn">▶</button>
    <div class="progress-wrap">
      <span class="time" id="curTime">0:00</span>
      <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
      <span class="time" id="durTime">0:00</span>
    </div>
    <button class="secondary" id="jumpBtn">К хуку</button>
  </div>

</div>

<audio id="audio"></audio>

<script>
let words = [];
let audioURL = null;
const STORAGE_KEY = 'karaoke_library_v1';

const audio = document.getElementById('audio');
const lyricsEl = document.getElementById('lyrics');
const playBtn = document.getElementById('playBtn');
const progressBar = document.getElementById('progressBar');
const progressFill = document.getElementById('progressFill');
const curTimeEl = document.getElementById('curTime');
const durTimeEl = document.getElementById('durTime');
const statusEl = document.getElementById('status');
const libraryEl = document.getElementById('library');

function fmtTime(s) {
  if (!isFinite(s)) return '0:00';
  const m = Math.floor(s / 60), sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2,'0')}`;
}

// ---- Библиотека уже распознанных треков (тайминги кэшируются в браузере) ----
function getLibrary() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
  catch { return {}; }
}
function saveToLibrary(key, entry) {
  const lib = getLibrary();
  lib[key] = entry; // { title, artist, words, offset }
  localStorage.setItem(STORAGE_KEY, JSON.stringify(lib));
  renderLibrary();
}
function renderLibrary() {
  const lib = getLibrary();
  const keys = Object.keys(lib);
  if (!keys.length) { libraryEl.style.display = 'none'; return; }
  libraryEl.style.display = 'flex';
  libraryEl.innerHTML = '';
  keys.forEach(key => {
    const entry = lib[key];
    const chip = document.createElement('div');
    chip.className = 'track-chip';
    chip.textContent = `${entry.title || key} — ${entry.artist || ''}`;
    chip.addEventListener('click', () => {
      statusEl.textContent = 'Загрузите этот же аудиофайл, чтобы проиграть с готовым текстом (тайминги уже есть, распознавать заново не нужно) — просто выберите его в поле выше и повторно текст подтянется автоматически.';
    });
    libraryEl.appendChild(chip);
  });
}
renderLibrary();

document.getElementById('loadBtn').addEventListener('click', async () => {
  const fileInput = document.getElementById('audioFile');
  const file = fileInput.files[0];
  if (!file) { statusEl.textContent = 'Выберите файл трека'; statusEl.className='status error'; return; }

  const title = document.getElementById('titleInput').value;
  const artist = document.getElementById('artistInput').value;
  const cacheKey = `${file.name}_${file.size}`;

  if (audioURL) URL.revokeObjectURL(audioURL);
  audioURL = URL.createObjectURL(file);
  audio.src = audioURL;

  const lib = getLibrary();
  if (lib[cacheKey]) {
    // Уже распознавали этот файл раньше — тайминги берём из кэша, без повторного вызова API
    words = lib[cacheKey].words;
    statusEl.textContent = 'Найдено в кэше — распознавание не требуется ✓';
    statusEl.className = 'status';
    finishLoad(title || lib[cacheKey].title, artist || lib[cacheKey].artist);
    return;
  }

  statusEl.innerHTML = '<span class="spinner"></span>Распознаю текст...';
  statusEl.className = 'status';
  document.getElementById('loadBtn').disabled = true;

  try {
    const formData = new FormData();
    formData.append('audio', file);

    const resp = await fetch('/api/transcribe', { method: 'POST', body: formData });
    const data = await resp.json();

    if (!resp.ok) throw new Error(data.error || 'Ошибка сервера');

    words = data.words;
    saveToLibrary(cacheKey, { title, artist, words });
    statusEl.textContent = `Готово: распознано ${words.length} слов ✓`;
    finishLoad(title, artist);
  } catch (e) {
    statusEl.textContent = 'Ошибка: ' + e.message;
    statusEl.className = 'status error';
  } finally {
    document.getElementById('loadBtn').disabled = false;
  }
});

function finishLoad(title, artist) {
  renderLyrics();
  if (title || artist) {
    document.getElementById('meta').style.display = 'block';
    document.getElementById('metaTitle').textContent = title || '';
    document.getElementById('metaArtist').textContent = artist || '';
  }
  document.getElementById('controls').style.display = 'flex';
}

function renderLyrics() {
  lyricsEl.innerHTML = '';
  words.forEach((w) => {
    const span = document.createElement('span');
    span.className = 'word';
    span.textContent = w.word;
    span.addEventListener('click', () => { audio.currentTime = w.start; audio.play(); playBtn.textContent = '⏸'; });
    lyricsEl.appendChild(span);
  });
}

function updateHighlight(t) {
  const spans = lyricsEl.querySelectorAll('.word');
  let activeIdx = -1;
  for (let i = 0; i < words.length; i++) {
    if (t >= words[i].start && t <= words[i].end) { activeIdx = i; break; }
    if (t < words[i].start) break;
  }
  spans.forEach((span, i) => {
    span.classList.remove('active', 'past');
    if (i === activeIdx) { span.classList.add('active'); span.scrollIntoView({ block: 'center', behavior: 'smooth' }); }
    else if (words[i] && words[i].end < t) { span.classList.add('past'); }
  });
}

audio.addEventListener('timeupdate', () => {
  updateHighlight(audio.currentTime);
  const pct = (audio.currentTime / audio.duration) * 100 || 0;
  progressFill.style.width = pct + '%';
  curTimeEl.textContent = fmtTime(audio.currentTime);
});
audio.addEventListener('loadedmetadata', () => { durTimeEl.textContent = fmtTime(audio.duration); });
playBtn.addEventListener('click', () => {
  if (audio.paused) { audio.play(); playBtn.textContent = '⏸'; }
  else { audio.pause(); playBtn.textContent = '▶'; }
});
audio.addEventListener('ended', () => { playBtn.textContent = '▶'; });
progressBar.addEventListener('click', (e) => {
  const rect = progressBar.getBoundingClientRect();
  audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
});
document.getElementById('jumpBtn').addEventListener('click', () => {
  const offset = parseFloat(document.getElementById('startOffset').value) || 0;
  audio.currentTime = offset;
  audio.play();
  playBtn.textContent = '⏸';
});
</script>
</body>
</html>
