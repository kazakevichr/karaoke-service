<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Музыкальное лото — оффлайн</title>
<style>
  /* ==========================================================================
     Оффлайн-версия игры «Музыкальное лото».
     Это НЕ редактор банка треков — только сама игра: сетка чисел, розыгрыш,
     караоке-плеер и бланки для участников. Все данные (тексты, тайминги,
     раскладка по числам) зашиты ниже в window.GAME_DATA, аудио и обложки —
     обычные файлы рядом (папки audio/ и photos/). Открывается двойным кликом
     по этому файлу в любом браузере, интернет не нужен вообще.
     ========================================================================== */
  :root { --bg:#0d0b1a; --bg2:#171332; --accent:#ff2e63; --accent2:#3b82f6;
          --dim:#4a4868; --past:#8a87b8; --card:#1e1a3d; }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; overflow:hidden;
    background:radial-gradient(ellipse at 50% 0%, var(--bg2) 0%, var(--bg) 70%);
    font-family:'Segoe UI',Arial,sans-serif; color:#fff; }
  .view { display:none; height:100vh; flex-direction:column; }
  .view.on { display:flex; }

  .top { padding:12px 20px; background:rgba(0,0,0,.35); border-bottom:1px solid rgba(255,255,255,.08);
         display:flex; gap:10px; align-items:center; flex-wrap:wrap; flex-shrink:0; }
  .top .sp { flex:1; }
  label.f { font-size:11px; color:var(--past); text-transform:uppercase; letter-spacing:.06em; display:block; margin-bottom:4px; }
  .fld { display:flex; flex-direction:column; }
  input,textarea,select { background:var(--card); border:1px solid rgba(255,255,255,.15); color:#fff;
    padding:8px 11px; border-radius:8px; font-size:14px; font-family:inherit; }
  input[type=number]{ width:88px; } select{ cursor:pointer; }
  textarea { resize:vertical; line-height:1.45; }
  button { background:linear-gradient(135deg,var(--accent),#ff5f8f); border:0; color:#fff;
           padding:10px 16px; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; }
  button.sec { background:rgba(255,255,255,.1); }
  button.gh { background:transparent; border:1px solid rgba(255,255,255,.2); }
  button.on { background:linear-gradient(135deg,var(--accent2),#60a5fa); }
  button:disabled { opacity:.4; cursor:not-allowed; }
  .status { font-size:13px; color:var(--past); }
  .status.err { color:var(--accent); }

  /* ---------- Сетка ---------- */
  #gridWrap { flex:1; min-height:0; display:grid; gap:1.1vh 1.1vw; padding:2.2vh 1.8vw; }
  .num { position:relative; display:flex; flex-direction:column; align-items:center; justify-content:center;
         border-radius:14px; background:linear-gradient(150deg, rgba(255,255,255,.07), rgba(255,255,255,.02));
         border:1px solid rgba(255,255,255,.09); font-weight:800; cursor:pointer;
         transition:transform .15s, background .2s, color .2s; color:#fff; min-height:0; overflow:hidden; }
  .num:hover { transform:translateY(-3px); background:linear-gradient(150deg, rgba(255,46,99,.4), rgba(255,46,99,.12)); }
  .num.empty { color:var(--dim); background:rgba(255,255,255,.02); border-style:dashed; cursor:default; }
  .num.empty:hover { transform:none; background:rgba(255,255,255,.02); }
  .num.played { color:var(--past); background:rgba(255,46,99,.08); border-color:rgba(255,46,99,.28); opacity:.82; }
  .num.played .d span { position:relative; }
  .num.played .d span::after { content:''; position:absolute; left:-8%; right:-8%; top:48%; height:6%;
                               background:var(--accent); border-radius:3px; }
  .num.played .playedInfo { display:flex; flex-direction:column; align-items:center; justify-content:center;
                             gap:.35vh; padding:0 .5vw; width:100%; }
  .num.played .playedInfo .pt { font-size:1.9vh; font-weight:800; line-height:1.18; text-align:center;
                                 color:var(--past); overflow:hidden; max-height:4.6vh; }
  .num.played .playedInfo .pa { font-size:1.3vh; font-weight:600; color:var(--dim); text-transform:uppercase;
                                 letter-spacing:.04em; text-align:center; overflow:hidden; max-height:1.8vh; }
  .num.played .num-badge { position:absolute; top:.6vh; right:.7vw; font-size:1.1vh; font-weight:700; color:var(--dim); }
  .num.last { box-shadow:0 0 0 3px var(--accent), 0 0 40px rgba(255,46,99,.5); }

  /* ---------- Плеер ---------- */
  .stage { flex:1; min-height:0; display:grid;
           grid-template-columns:40% 60%; grid-template-rows:52% 48%; position:relative; }
  .zone-photo { grid-row:1; grid-column:1; display:flex; align-items:center; justify-content:center;
                padding:2.4vh 1.6vw 1.8vh 2.4vw; min-height:0; }
  .zone-photo img { max-width:100%; max-height:100%; object-fit:contain; border-radius:18px;
                    box-shadow:0 18px 60px rgba(0,0,0,.65), 0 0 0 1px rgba(255,255,255,.08); }
  .photo-ph { width:84%; aspect-ratio:1; border-radius:18px;
              background:linear-gradient(145deg,#241f4d,#16123a); border:1px dashed rgba(255,255,255,.14);
              display:flex; align-items:center; justify-content:center; font-size:9vh; color:rgba(255,255,255,.13); }
  .zone-info { grid-row:1; grid-column:2; display:flex; flex-direction:column; justify-content:center;
               padding:2.4vh 3.5vw 1.8vh 1.6vw; min-height:0; gap:1.6vh; position:relative; }
  .zone-info .title { font-size:8.6vh; font-weight:800; line-height:1.03; letter-spacing:-.02em;
                      text-shadow:0 4px 40px rgba(255,46,99,.35); overflow-wrap:break-word; }
  .zone-info .artist { font-size:4.8vh; font-weight:600; color:var(--accent);
                       text-transform:uppercase; letter-spacing:.06em; line-height:1.1; }
  .zone-info .divider { width:110px; height:5px; border-radius:3px;
                        background:linear-gradient(90deg,var(--accent),var(--accent2)); }
  .zone-info .badge { position:absolute; top:1.6vh; right:2vw; font-size:3.4vh; font-weight:800; color:var(--dim); }
  .zone-lyrics { grid-row:2; grid-column:1/-1; position:relative; overflow:hidden;
                 border-top:1px solid rgba(255,255,255,.07);
                 background:linear-gradient(180deg, rgba(255,255,255,.02), transparent); }
  .lyr-track { position:absolute; left:0; right:0; top:0; padding:0 4vw; text-align:center;
               transition:transform .45s cubic-bezier(.4,0,.2,1); }
  .line { font-size:6.5vh; font-weight:700; line-height:1.3; padding:.4vh 0; color:var(--dim);
          opacity:0; transition:color .3s, opacity .35s, transform .35s; }
  .line.n2 { opacity:.2; } .line.n1 { opacity:.44; color:var(--past); }
  .line.active { opacity:1; transform:scale(1.04); }
  .line .w { display:inline-block; margin:0 .26em; color:inherit; }
  .line.active .w { color:var(--past); transition:color .12s, text-shadow .12s; }
  .line.active .w.sung { color:#fff; text-shadow:0 0 24px var(--accent), 0 0 52px rgba(255,46,99,.5); }

  .bar { padding:12px 20px; background:rgba(0,0,0,.35); border-top:1px solid rgba(255,255,255,.08);
         display:flex; align-items:center; gap:10px; flex-shrink:0; }
  .prog { flex:1; height:6px; background:rgba(255,255,255,.12); border-radius:3px; cursor:pointer; }
  .fill { height:100%; width:0; border-radius:3px; background:linear-gradient(90deg,var(--accent),var(--accent2)); }
  .time { font-size:13px; color:var(--past); min-width:44px; font-variant-numeric:tabular-nums; }

  /* ---------- Бланки (панель поверх) ---------- */
  .sync { position:fixed; inset:0; background:rgba(8,6,20,.97); z-index:70; display:none;
          flex-direction:column; padding:18px 36px; }
  .sync.on { display:flex; }
  .sync h3 { margin:0 0 5px; } .sync p { margin:0 0 12px; color:var(--past); font-size:14px; }
  .sync-actions { display:flex; gap:10px; padding-top:12px; }
  .row { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:14px; align-items:flex-end; }
  .full { width:100%; }

  /* ---------- Начальный экран ---------- */
  #vIntro { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px; text-align:center; padding:5vh 5vw; }
  #vIntro h1 { font-size:34px; margin:0; }
  #vIntro p { color:var(--past); font-size:16px; max-width:560px; margin:0; }
</style>
</head>
<body>

<!-- ============ СТАРТОВЫЙ ЭКРАН ============ -->
<div class="view on" id="vIntro">
  <h1 id="introTitle">Музыкальное лото</h1>
  <p id="introSub"></p>
  <button id="btnIntroStart" style="font-size:16px;padding:14px 28px">Начать игру</button>
</div>

<!-- ============ ИГРА ============ -->
<div class="view" id="vGrid">
  <div class="top">
    <div class="fld"><label class="f">Раунды</label><div id="roundTabs" style="display:flex;gap:6px"></div></div>
    <div class="fld"><label class="f">Ячеек (макс. <span id="maxCells"></span>)</label>
      <input type="number" id="rSize" min="1" style="width:100px">
    </div>
    <button class="sec" id="btnReshuffle">Перетасовать</button>
    <button class="sec" id="btnRandom">Случайное число</button>
    <button class="gh" id="btnUndo">Сбросить последнюю</button>
    <button class="gh" id="btnResetPlayed">Сбросить все</button>
    <button class="sec" id="btnBlanks">Бланки для участников</button>
    <div class="sp"></div>
    <span class="status" id="gStatus"></span>
    <button class="gh" id="btnFullG">⛶</button>
  </div>
  <div id="gridWrap"></div>
</div>

<!-- ============ ПЛЕЕР ============ -->
<div class="view" id="vPlay">
  <div class="stage">
    <div class="zone-photo" id="zonePhoto"><div class="photo-ph">♪</div></div>
    <div class="zone-info">
      <div class="badge" id="zBadge"></div>
      <div class="title" id="zTitle"></div>
      <div class="divider"></div>
      <div class="artist" id="zArtist"></div>
    </div>
    <div class="zone-lyrics" id="zoneLyrics"><div class="lyr-track" id="lyrTrack"></div></div>
  </div>
  <div class="bar">
    <button class="sec" id="btnBack">← К числам</button>
    <button id="btnPlay">▶</button>
    <button class="sec" id="btnHook">↻ Припев</button>
    <button class="sec" id="btnStart">⏮ С начала</button>
    <span class="time" id="tCur">0:00</span>
    <div class="prog" id="prog"><div class="fill" id="fill"></div></div>
    <span class="time" id="tDur">0:00</span>
    <button class="gh" id="btnFullP">⛶</button>
  </div>
</div>

<!-- ============ БЛАНКИ ДЛЯ УЧАСТНИКОВ ============ -->
<div class="sync" id="blanksView">
  <h3>Бланки для участников</h3>
  <p>Как в лото: каждому игроку — свой уникальный бланк из треков, которые
     реально расставлены в текущем раунде. Открывается отдельная страница для
     печати — по одному бланку на лист.</p>
  <div class="row" style="margin:0 0 6px">
    <span class="status" id="blanksPoolInfo"></span>
  </div>
  <div class="row">
    <div class="fld"><label class="f">Игроков (бланков)</label><input type="number" id="bnCount" min="1" max="200" value="20" style="width:100px"></div>
    <div class="fld"><label class="f">Заголовок</label><input type="text" id="bnTitle" style="width:280px"></div>
  </div>
  <div class="row">
    <div class="fld full"><label class="f">Текст раунда</label><input type="text" id="bnRoundLabel" class="full"></div>
  </div>
  <div class="row">
    <div class="fld"><label class="f">Номинация (необязательно)</label><input type="text" id="bnNomination" style="width:340px" placeholder="например: Самый активный и весёлый столик"></div>
    <div class="fld"><label class="f">Подпись</label><input type="text" id="bnTagline" style="width:220px"></div>
  </div>
  <div class="sync-actions">
    <button id="btnBlanksGenerate">Сгенерировать и открыть</button>
    <span class="status" id="blanksStatus"></span>
    <div style="flex:1"></div>
    <button class="gh" id="btnBlanksClose">Закрыть</button>
  </div>
</div>

<audio id="audio"></audio>

<script>
/* ========== Данные игры — зашиты сервером при скачивании архива, никакой
   сети не требуется. ========== */
window.GAME_DATA = /*__GAME_DATA__*/null;

(function(){
  const GAME = window.GAME_DATA;
  if (!GAME) { document.body.innerHTML = '<p style="padding:40px;color:#fff;font-family:sans-serif">Не удалось найти данные игры — файл повреждён или открыт не полностью распакованным.</p>'; return; }

  // Свежее игровое состояние поверх сохранённой раскладки: played/history не
  // переносятся из момента сохранения — офлайн-игра всегда начинается "с чистого листа".
  const rounds = GAME.rounds.map(r => ({
    category: r.category, size: +r.size || Object.keys(r.map||{}).length,
    origMap: { ...(r.map||{}) },   // исходная раскладка на момент скачивания — от неё "Перетасовать" не может уйти дальше вниз
    map: { ...(r.map||{}) }, played: {}, history: [],
  }));
  const tracks = GAME.tracks || {};
  let activeRoundIdx = 0;

  const $ = id => document.getElementById(id);
  const audio = $('audio');
  const fmt = s => isFinite(s) ? Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0') : '0:00';
  const shuffleArr = arr => [...arr].sort(()=>Math.random()-.5);
  const escapeHtml = s => String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const say = (el,t,err) => { const e=$(el); e.innerHTML=t; e.className='status'+(err?' err':''); };
  const trackById = id => tracks[id];
  const show = v => ['vIntro','vGrid','vPlay'].forEach(x=>$(x).classList.toggle('on', x===v));

  function activeRound(){ return rounds[activeRoundIdx]; }

  /* ========== Стартовый экран ========== */
  const totalTracks = Object.keys(tracks).length;
  $('introTitle').textContent = GAME.name || 'Музыкальное лото';
  $('introSub').textContent = `Сохранено ${new Date(GAME.savedAt||Date.now()).toLocaleDateString('ru')} · ${rounds.length} ${rounds.length===1?'раунд':'раунда(ов)'} · ${totalTracks} треков. Играется полностью без интернета.`;
  $('btnIntroStart').onclick = () => { show('vGrid'); renderRoundTabs(); syncSizeControl(); renderGrid(); };

  /* ========== Раунды и сетка ========== */
  function renderRoundTabs(){
    const box=$('roundTabs'); box.innerHTML='';
    if (rounds.length<=1) return;
    rounds.forEach((r,i)=>{
      const cnt=Object.values(r.map||{}).filter(Boolean).length;
      const b=document.createElement('button'); b.type='button';
      b.className='sec'+(i===activeRoundIdx?' on':'');
      b.style.cssText='display:flex;flex-direction:column;align-items:center;line-height:1.3;padding:8px 14px';
      b.innerHTML=`<span>Раунд ${i+1}</span><span style="font-size:11px;opacity:.75">${r.category?r.category+' · '+cnt:cnt}</span>`;
      b.onclick=()=>{ activeRoundIdx=i; renderRoundTabs(); syncSizeControl(); renderGrid(); };
      box.appendChild(b);
    });
  }
  function syncSizeControl(){
    const r=activeRound();
    const maxN = Object.keys(r.origMap).filter(k=>r.origMap[k]).length;
    $('maxCells').textContent = maxN;
    $('rSize').max = maxN;
    $('rSize').value = r.size;
  }
  function renderGrid(){
    const r=activeRound();
    const size=+r.size||1;
    const cols = size<=20?5 : size<=30?6 : size<=40?8 : 10;
    const wrap=$('gridWrap');
    wrap.style.gridTemplateColumns=`repeat(${cols},1fr)`;
    wrap.style.gridTemplateRows=`repeat(${Math.ceil(size/cols)},1fr)`;
    wrap.innerHTML='';
    const map=r.map||{}, played=r.played||{};
    for(let i=1;i<=size;i++){
      const tid=map[i], t=tid?trackById(tid):null;
      const d=document.createElement('div');
      const isPlayed=!!played[i];
      d.className='num'+(t?'':' empty')+(isPlayed?' played':'');
      const fs = size<=20?'6.4vh' : size<=30?'5.4vh' : size<=40?'4.6vh':'3.9vh';
      if(isPlayed && t){
        d.innerHTML=`<span class="num-badge">№${i}</span>`+
                    `<div class="playedInfo"><div class="pt">${escapeHtml(t.title||'без названия')}</div><div class="pa">${escapeHtml(t.artist||'')}</div></div>`;
      } else {
        d.innerHTML=`<div class="d" style="font-size:${fs}"><span>${i}</span></div>`;
      }
      d.onclick=()=>{ if(t) openTrack(t,i); };
      wrap.appendChild(d);
    }
    const cnt=Object.values(map).filter(Boolean).length;
    say('gStatus', `Раунд ${activeRoundIdx+1}${r.category?' · '+r.category:''}: ${cnt} из ${size} расставлено`);
  }
  // "Перетасовать" — офлайн-аналог «Разыграть раунд»: можно только уменьшить
  // или заново перемешать число ячеек в пределах того, что реально скачано
  // (origMap) — новые треки взять неоткуда, интернета нет.
  $('btnReshuffle').onclick = () => {
    const r=activeRound();
    const maxN = Object.keys(r.origMap).filter(k=>r.origMap[k]).length;
    let n = Math.max(1, Math.min(maxN, +$('rSize').value || maxN));
    const hasProgress = Object.keys(r.played||{}).length>0;
    if(hasProgress && !confirm(`Раунд ${activeRoundIdx+1} будет перетасован заново — текущие отметки сыгранного сотрутся. Продолжить?`)) return;
    const ids = shuffleArr(Object.values(r.origMap).filter(Boolean)).slice(0, n);
    const map={}; ids.forEach((tid,idx)=>{ map[idx+1]=tid; });
    r.size=n; r.map=map; r.played={}; r.history=[];
    syncSizeControl(); renderGrid();
    say('gStatus', `Раунд ${activeRoundIdx+1}: ${n} треков перетасовано заново`);
  };
  $('btnResetPlayed').onclick = () => { const r=activeRound(); r.played={}; r.history=[]; renderGrid(); };
  $('btnUndo').onclick = () => {
    const r=activeRound(); const h=r.history||[];
    if(!h.length) return say('gStatus','Нечего отменять', true);
    const n=h.pop();
    if(r.played) delete r.played[n];
    renderGrid(); say('gStatus',`Отметка с числа ${n} снята`);
  };
  $('btnRandom').onclick = () => {
    const r=activeRound(); const map=r.map||{}, played=r.played||{};
    const avail=Object.keys(map).filter(n=>map[n]&&!played[n]);
    if(!avail.length) return say('gStatus','Все треки раунда уже сыграны', true);
    const n=avail[Math.floor(Math.random()*avail.length)];
    [...$('gridWrap').children].forEach(c=>c.classList.remove('last'));
    const el=$('gridWrap').children[n-1];
    if(el){ el.classList.add('last'); el.scrollIntoView({block:'center'}); }
    say('gStatus',`Выпало число ${n}`);
  };
  function toggleFull(){ if(!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }
  $('btnFullG').onclick=toggleFull; $('btnFullP').onclick=toggleFull;

  /* ========== ПЛЕЕР ========== */
  let lines=[], lastActive=-1;
  function openTrack(t, number){
    show('vPlay');
    lines=t.lines||[]; lastActive=-1;
    $('zTitle').textContent=t.title||''; $('zArtist').textContent=t.artist||'';
    $('zBadge').textContent = number?'№'+number:'';
    $('zonePhoto').innerHTML = t.photoFile ? `<img src="${t.photoFile}">` : '<div class="photo-ph">♪</div>';
    audio.src = t.audioFile || '';
    renderLines();
    const hook=+t.hook||0; window.__hook=hook;
    audio.addEventListener('loadedmetadata', function once(){
      audio.removeEventListener('loadedmetadata', once);
      audio.currentTime=hook; audio.play().catch(()=>{}); $('btnPlay').textContent='⏸';
    });
    if(number){
      const r=activeRound();
      r.played=r.played||{}; r.history=r.history||[];
      if(!r.played[number]){ r.played[number]=true; r.history.push(number); }
    }
  }
  $('btnBack').onclick=()=>{ audio.pause(); $('btnPlay').textContent='▶'; show('vGrid'); renderGrid(); };
  $('btnHook').onclick=()=>{ audio.currentTime=window.__hook||0; audio.play().catch(()=>{}); $('btnPlay').textContent='⏸'; };
  $('btnStart').onclick=()=>{ audio.currentTime=0; audio.play().catch(()=>{}); $('btnPlay').textContent='⏸'; };
  $('btnPlay').onclick=()=>{ if(audio.paused){audio.play().catch(()=>{});$('btnPlay').textContent='⏸';} else {audio.pause();$('btnPlay').textContent='▶';} };
  $('prog').onclick=e=>{ const r=$('prog').getBoundingClientRect(); audio.currentTime=((e.clientX-r.left)/r.width)*audio.duration; };
  document.addEventListener('keydown', e=>{
    if (!$('vPlay').classList.contains('on')) return;
    if(e.code==='Escape') $('btnBack').click();
    if(e.code==='KeyR') $('btnHook').click();
    if(e.code==='KeyS') $('btnStart').click();
    if(e.code==='Space'){ e.preventDefault(); $('btnPlay').click(); }
  });

  /* ========== КАРАОКЕ ========== */
  function renderLines(){
    const t=$('lyrTrack'); t.innerHTML='';
    lines.forEach((ln,i)=>{
      const d=document.createElement('div'); d.className='line'; d.dataset.i=i;
      (ln.words||[]).forEach(w=>{ const s=document.createElement('span'); s.className='w'; s.textContent=w.w; d.appendChild(s); });
      d.onclick=()=>{ audio.currentTime=ln.start||0; audio.play().catch(()=>{}); $('btnPlay').textContent='⏸'; };
      t.appendChild(d);
    });
    positionTrack(0);
  }
  function positionTrack(idx){
    const els=$('lyrTrack').children; if(!els.length) return;
    const el=els[Math.max(0,Math.min(idx,els.length-1))];
    const y=$('zoneLyrics').clientHeight*0.30 - el.offsetTop - el.offsetHeight/2;
    $('lyrTrack').style.transform=`translateY(${y}px)`;
  }
  function tick(){
    const t=audio.currentTime; let act=-1;
    for(let i=0;i<lines.length;i++){
      const ln=lines[i];
      if(i>0 && ln.start<=0 && ln.end<=0) continue;
      if(t>=ln.start&&t<=ln.end){act=i;break;}
      if(t>ln.end)act=i;
    }
    const els=$('lyrTrack').children;
    for(let i=0;i<els.length;i++){
      const d=Math.abs(i-act); let c='line';
      if(i===act)c+=' active'; else if(d===1)c+=' n1'; else if(d===2)c+=' n2';
      els[i].className=c;
      if(i===act){ const ws=els[i].querySelectorAll('.w');
        for(let k=0;k<ws.length;k++) ws[k].classList.toggle('sung', lines[i].words[k].start<=t); }
    }
    if(act!==lastActive){ positionTrack(act); lastActive=act; }
    $('fill').style.width=((t/audio.duration)*100||0)+'%'; $('tCur').textContent=fmt(t);
  }
  audio.addEventListener('timeupdate', ()=>{ if($('vPlay').classList.contains('on')) tick(); });
  audio.addEventListener('loadedmetadata', ()=>$('tDur').textContent=fmt(audio.duration));
  audio.addEventListener('ended', ()=>$('btnPlay').textContent='▶');
  window.addEventListener('resize', ()=>positionTrack(lastActive<0?0:lastActive));

  /* ========== БЛАНКИ ДЛЯ УЧАСТНИКОВ (без QR — он был для онлайн-проверки) ========== */
  function trackLabel(id){
    const t=trackById(id);
    if(!t) return '—';
    const parts=[]; if(t.artist) parts.push(t.artist); parts.push(t.title||'Без названия');
    return parts.join(' - ');
  }
  function blankPoolIds(roundIdx){
    return [...new Set(Object.values(rounds[roundIdx].map||{}).filter(Boolean))];
  }
  function buildBlankCards(roundIdx, opts){
    const poolIds=blankPoolIds(roundIdx);
    if(!poolIds.length) return null;
    const cols=5;
    const cellCount=Math.min(25, poolIds.length);
    const rows=Math.ceil(cellCount/cols);
    const cards=[];
    for(let i=0;i<opts.count;i++) cards.push(shuffleArr(poolIds).slice(0,cellCount));
    return { cols, rows, cellCount, cards, title:opts.title, roundLabel:opts.roundLabel, nomination:opts.nomination, tagline:opts.tagline };
  }
  function renderBlanksDoc(blanks){
    const cardsHtml=blanks.cards.map(cardIds=>{
      let rowsHtml='';
      for(let ri=0; ri<blanks.rows; ri++){
        let cellsHtml='';
        for(let ci=0; ci<blanks.cols; ci++){
          const idx=ri*blanks.cols+ci;
          cellsHtml += idx<cardIds.length
            ? `<td>${escapeHtml(trackLabel(cardIds[idx]))}</td>`
            : `<td class="empty">—</td>`;
        }
        rowsHtml += `<tr>${cellsHtml}</tr>`;
      }
      return `<div class="card">
        <h1>${escapeHtml(blanks.title||'МУЗЫКАЛЬНОЕ ЛОТО')}</h1>
        <table class="grid"><tbody>${rowsHtml}</tbody></table>
        <div class="footer">
          ${blanks.roundLabel ? `<div class="line1">${escapeHtml(blanks.roundLabel)}</div>` : ''}
          ${blanks.nomination ? `<div class="line2">Номинация <i>${escapeHtml(blanks.nomination)}</i></div>` : ''}
          ${blanks.tagline ? `<div class="line3">${escapeHtml(blanks.tagline)}</div>` : ''}
        </div>
      </div>`;
    }).join('');
    return `<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8">
    <title>Бланки — ${escapeHtml(blanks.title||'МУЗЫКАЛЬНОЕ ЛОТО')}</title>
    <style>
      @page { size: A4; margin: 12mm; }
      * { box-sizing:border-box; }
      body { font-family: Arial, Helvetica, sans-serif; color:#000; background:#fff; margin:0; }
      .card { page-break-after:always; padding:8mm 4mm; }
      .card:last-child { page-break-after:auto; }
      .card h1 { font-size:38px; font-weight:900; text-align:center; letter-spacing:.01em; margin:0 0 16px; }
      table.grid { width:100%; border-collapse:collapse; table-layout:fixed; }
      table.grid td { border:2px solid #000; padding:12px 6px; text-align:center; font-weight:700;
                      font-size:14px; line-height:1.25; vertical-align:middle; height:64px; }
      table.grid td.empty { color:#ccc; border-color:#999; }
      .footer { margin-top:18px; }
      .footer .line1 { font-size:19px; font-weight:800; }
      .footer .line2 { font-size:17px; font-weight:700; margin-top:6px; }
      .footer .line2 i { font-weight:600; font-style:italic; }
      .footer .line3 { font-size:19px; font-weight:800; margin-top:10px; }
      .toolbar { padding:14px; text-align:center; }
      .toolbar button { font-size:15px; padding:9px 22px; border-radius:8px; border:0;
                         background:#ff2e63; color:#fff; font-weight:700; cursor:pointer; }
      @media print { .toolbar { display:none; } }
    </style></head><body>
    <div class="toolbar"><button onclick="window.print()">Печать / Сохранить как PDF</button></div>
    ${cardsHtml}
    </body></html>`;
  }
  function openBlanksModal(){
    const idx=activeRoundIdx;
    const r=rounds[idx];
    const poolIds=blankPoolIds(idx);
    say('blanksPoolInfo', !poolIds.length
      ? `Раунд ${idx+1}: треки не расставлены.`
      : `Раунд ${idx+1}${r.category?' · '+r.category:''}: доступно ${poolIds.length} треков для бланка (карточка вместит до ${Math.min(25,poolIds.length)}).`);
    $('bnCount').value = 20;
    $('bnTitle').value = 'МУЗЫКАЛЬНОЕ ЛОТО';
    $('bnRoundLabel').value = `${idx+1} раунд: Собери комбинацию по вертикали или горизонтали`;
    $('bnNomination').value = '';
    $('bnTagline').value = 'Давайте общаться!';
    say('blanksStatus', '');
    $('blanksView').classList.add('on');
  }
  $('btnBlanks').onclick=openBlanksModal;
  $('btnBlanksClose').onclick=()=>$('blanksView').classList.remove('on');
  $('btnBlanksGenerate').onclick=()=>{
    const idx=activeRoundIdx;
    const count=Math.max(1, Math.min(200, +$('bnCount').value||20));
    const opts={
      count,
      title:$('bnTitle').value.trim()||'МУЗЫКАЛЬНОЕ ЛОТО',
      roundLabel:$('bnRoundLabel').value.trim(),
      nomination:$('bnNomination').value.trim(),
      tagline:$('bnTagline').value.trim(),
    };
    const blanks=buildBlankCards(idx, opts);
    if(!blanks) return say('blanksStatus','В этом раунде нет расставленных треков', true);
    say('blanksStatus', `Сгенерировано ${blanks.cards.length} бланков ✓`);
    const win=window.open('', '_blank');
    if(!win) return say('blanksStatus','Браузер заблокировал открытие окна — разрешите всплывающие окна для этой страницы', true);
    win.document.open(); win.document.write(renderBlanksDoc(blanks)); win.document.close();
  };
})();
</script>
</body>
</html>
